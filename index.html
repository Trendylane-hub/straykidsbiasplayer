<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SKZ Audio Hub</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin: 20px;
}

/* BUTTON STYLE */
.buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 10px;
}

.buttons button {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #222;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.buttons button:hover {
  background: #ff3c3c;
  transform: scale(1.05);
}

/* SECTION */
.section {
  display: none;
  margin-top: 20px;
  animation: fade 0.3s ease;
}

iframe {
  width: 90%;
  height: 360px;
  border-radius: 12px;
}

@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>

<script>
function showSection(id){
  let sec = document.getElementsByClassName("section");
  for(let i=0;i<sec.length;i++){
    sec[i].style.display="none";
  }
  document.getElementById(id).style.display="block";
}
</script>

</head>

<body>

<h1>Stray Kids Audio Hub 🎧</h1>

<!-- BUTTONS (YOUR FORMAT) -->
<div class="buttons">
  <button onclick="showSection('group')">Group | Play</button>
  <button onclick="showSection('in')">I.N | Play</button>
  <button onclick="showSection('chan')">Bang Chan | Play</button>
  <button onclick="showSection('hyunjin')">Hyunjin | Play</button>
</div>

<!-- GROUP -->
<div id="group" class="section">
  <h2>Group</h2>

  <iframe 
    src="https://www.youtube.com/embed/videoseries?list=PLrU8gIlL5C0Qexample"
    allow="autoplay; encrypted-media">
  </iframe>

  <p>Stray Kids Playlist</p>
</div>

<!-- I.N -->
<div id="in" class="section">
  <h2>I.N</h2>

  <iframe 
    src="https://www.youtube.com/embed/n5B5q1Hwt_U"
    allow="autoplay; encrypted-media">
  </iframe>

  <p>I.N Song</p>
</div>

<!-- BANG CHAN -->
<div id="chan" class="section">
  <h2>Bang Chan</h2>

  <iframe 
    src="https://www.youtube.com/embed/videoseries?list=PLREPLACECHAN"
    allow="autoplay; encrypted-media">
  </iframe>

</div>

<!-- HYUNJIN -->
<div id="hyunjin" class="section">
  <h2>Hyunjin</h2>

  <iframe 
    src="https://www.youtube.com/embed/videoseries?list=PLREPLACEHYUNJIN"
    allow="autoplay; encrypted-media">
  </iframe>

</div>

</body>
</html>
